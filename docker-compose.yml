version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mlops
      POSTGRES_PASSWORD: mlops
      POSTGRES_DB: mlops
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri /mlflow/mlruns --default-artifact-root /mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow

  backend:
    build: ./backend
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://mlops:mlops@postgres:5432/mlops
      MLFLOW_TRACKING_URI: http://mlflow:5000
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - mlflow
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "5173:8080"
    depends_on:
      - backend

volumes:
  pg_data:
  mlflow_data:
